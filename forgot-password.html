<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password — AGLAEA</title>
    <meta name="description" content="Reset your AGLAEA password.">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/signup.css">
    <link rel="stylesheet" href="css/form-validation.css">
</head>
<body>
    
    <!-- Header -->
    <header class="header">
        <div class="container header-content">
            <a href="index.html" class="logo">AGLAEA</a>
            <nav class="nav">
                <a href="signin.html">← Back to Sign In</a>
            </nav>
        </div>
    </header>

    <!-- Forgot Password Section -->
    <section class="signup-section">
        <div class="container">
            <div class="signup-container" style="max-width: 500px;">
                
                <!-- Form View (default) -->
                <div id="formView">
                    <h1 class="signup-title">Forgot Your Password?</h1>
                    <p class="signup-subtitle">No problem. Enter your email and we'll send you a link to reset it.</p>
                    
                    <form id="forgotPasswordForm" class="signup-form">
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input 
                                type="email" 
                                id="email" 
                                name="email" 
                                required 
                                autocomplete="email"
                                autofocus
                            >
                            <div class="error-message" id="emailError"></div>
                        </div>
                        
                        <button type="submit" class="btn btn-primary btn-full" id="submitBtn">
                            Send Reset Link
                        </button>
                    </form>
                    
                    <p class="auth-footer-text">
                        Remember your password? <a href="signin.html">Sign in</a>
                    </p>
                </div>
                
                <!-- Success View (hidden by default) -->
                <div id="successView" style="display: none; text-align: center;">
                    <div style="font-size: 48px; color: #c9a870; margin-bottom: 20px;">✦</div>
                    <h1 class="signup-title">Check Your Inbox</h1>
                    <p class="signup-subtitle" style="margin-bottom: 32px;">
                        We've sent a password reset link to<br>
                        <strong id="sentEmail" style="color: #c9a870;"></strong>
                    </p>
                    <p style="color: #6b6b6b; font-size: 14px; margin-bottom: 32px; line-height: 1.6;">
                        Didn't receive it? Check your spam folder, or 
                        <a href="#" id="resendLink" style="color: #c9a870; text-decoration: underline;">try again</a>.
                    </p>
                    <a href="signin.html" class="btn btn-primary btn-full">Back to Sign In</a>
                </div>
                
            </div>
        </div>
    </section>

    <script type="module" src="js/forgot-password.js"></script>

</body>
</html>
