<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Aglaea</title>
    <meta name="description" content="Sign in to your AGLAEA account and manage your gift reminders.">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/signup.css">
    <link rel="stylesheet" href="css/form-validation.css">
</head>
<body>
    
    <!-- Header -->
    <header class="header">
        <div class="container header-content">
            <a href="index.html" class="logo">AGLAEA</a>
            <nav class="nav">
                <a href="index.html">← Back to Home</a>
            </nav>
        </div>
    </header>

    <!-- Sign In Section -->
    <section class="signup-section">
        <div class="container">
            <div class="signup-container" style="max-width: 500px;">
                
                <h1 class="signup-title">Welcome Back</h1>
                <p class="signup-subtitle">Sign in to manage your reminders</p>
                
                <!-- Sign In Form -->
                <form id="signinForm" class="signup-form">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" required autofocus>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-full" id="signinBtn">Sign In</button>
                    
                    <div style="text-align: center; margin-top: 1rem;">
                        <a href="forgot-password.html" id="forgotPasswordLink" style="color: var(--gold); font-size: 0.875rem;">Forgot password?</a>
                    </div>
                </form>

                <!-- Toggle to Sign Up -->
                <div style="text-align: center; margin-top: 2rem; padding-top: 2rem; border-top: 1px solid var(--stone);">
                    <p style="color: var(--slate); font-size: 0.938rem;">
                        Don't have an account? <a href="signup.html" style="color: var(--gold); font-weight: 500;">Sign Up</a>
                    </p>
                </div>

            </div>
        </div>
    </section>

    <!-- Sign In Logic -->
    <script type="module" src="js/signin.js"></script>
    <script src="js/mobile-menu.js"></script>
    
</body>
</html>
